<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
// --- [KOREKSI] Menerapkan prinsip DRY & memastikan sinkronisasi rumus pada Form, Kuitansi, dan Daftar Terima. ---

function formKeObjek(idForm) {
  const form = document.getElementById(idForm);
  if (!form) return {};
  
  const formData = new FormData(form);
  const obj = {};
  
  for (let [k, v] of formData.entries()) {
    if (obj[k]) {
      if (!Array.isArray(obj[k])) obj[k] = [obj[k]];
      obj[k].push(v);
    } else {
      obj[k] = v;
    }
  }
  return obj;
}

function getToken() {
  const el = document.getElementById('globalToken');
  if (el && el.value) {
    return el.value;
  } else {
    console.error("Token Session Missing!");
    return ""; 
  }
}

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebarMenu');
    const overlay = document.querySelector('.sidebar-overlay');

    sidebar.classList.toggle('active');
    overlay.classList.toggle('show');
    
    // Cegah scroll body saat menu dibuka di mobile
    if (sidebar.classList.contains('active')) {
      document.body.style.overflow = 'hidden';
    } else {
      document.body.style.overflow = 'auto';
    }
  }

  function menuClick(pageId, element) {
    showPage(pageId, element);
    if (window.innerWidth <= 768) {
      toggleSidebar();
    }
  }

  var GLOBAL_MASTER = {
    sekolah: null,
    guru: [],
    ttd: [],
    jenis: [],
  };
  
  var REF_DATA = {
    guru: [],
    ttd: [],
    jenis: [],
    sekolah: {}
  };

  const Toast = Swal.mixin({
    toast: true,
    position: 'top-end',
    showConfirmButton: false,
    timer: 3000,
    timerProgressBar: true,
    didOpen: (toast) => {
      toast.addEventListener('mouseenter', Swal.stopTimer)
      toast.addEventListener('mouseleave', Swal.resumeTimer)
    }
  });

  function showSuccess(pesan) { Toast.fire({ icon: 'success', title: pesan }); }
  function showError(pesan) { Toast.fire({ icon: 'error', title: pesan }); }

  function showLoading(pesan = 'Sedang memproses...') {
    Swal.fire({
      title: pesan,
      allowOutsideClick: false,
      didOpen: () => { Swal.showLoading() }
    });
  }

  function closeLoading() { Swal.close(); }

  function showPage(pageId, element) {
    document.querySelectorAll('.page-section').forEach(p => p.style.display = 'none');
    const target = document.getElementById(pageId);
    if (target) {
      target.style.display = 'block';
      target.style.animation = 'none';
      target.offsetHeight; 
      target.style.animation = 'fadeSlideUp 0.4s ease-out forwards';
    }

    if (element) {
      document.querySelectorAll('.sidebar a').forEach(l => l.classList.remove('active'));
      element.classList.add('active');
    }

    if (pageId === 'page-sekolah') loadSekolah();
    if (pageId === 'page-guru') loadDaftarGuru();
    if (pageId === 'page-ttd') loadDaftarTTD();
    if (pageId === 'page-jenis') loadJenisSurat();
    if (pageId === 'page-pengantar') loadPengantarData();
    if (pageId === 'page-kuitansi-umum') loadKuitansiUmumData();
    if (pageId === 'page-honor') loadDaftarHonor();
  }

window.addEventListener('load', function() {
  console.log("App Started...");
  
  // [MAGIC: CACHE LOKAL - FASE 1] Pre-warming UI dari localStorage (Mata berkedip 0 detik)
  const cacheSekolahLokal = localStorage.getItem('CACHE_SEKOLAH');
  if (cacheSekolahLokal) {
    try {
      const dataSekolahLokal = JSON.parse(cacheSekolahLokal);
      GLOBAL_MASTER.sekolah = dataSekolahLokal;
      
      // Tampilkan Nama Kop secara instan (Sesuai UI Baru)
      const elApp = document.getElementById('appName');
      if (elApp) elApp.innerText = dataSekolahLokal.kop3 || "DATA SEKOLAH";
    } catch(e) { console.warn("Cache lokal gagal dibaca."); }
  }

  google.script.run.withSuccessHandler(function(data) {
    console.log("Master Data Loaded:", data);
    GLOBAL_MASTER = data;

    if (data.sekolah) {
      // [MAGIC: CACHE LOKAL - FASE 3] Simpan/Timpa Brankas Browser dengan data Server terbaru
      localStorage.setItem('CACHE_SEKOLAH', JSON.stringify(data.sekolah));

      const elApp = document.getElementById('appName');
      if (elApp) {
           elApp.innerText = data.sekolah.kop3 || "BELUM ADA NAMA";
      }
    }

    loadTabelArsip();
  }).getAllMasterData(getToken());

  const modals = ['modalGuru', 'modalTTD', 'modalJenis'];
  modals.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.addEventListener('hidden.bs.modal', function() {
        const form = el.querySelector('form');
        if (form) {
          form.reset();
          const hidden = form.querySelector('input[type="hidden"]');
          if (hidden) hidden.value = "";
          const title = el.querySelector('.modal-title');
          if (title) title.innerText = title.innerText.replace("Edit", "Tambah");
        }
      });
    }
  });
});

  function loadSekolah() {
    const form = document.getElementById('formSekolah');
    const isiForm = (data) => {
      form.namaSekolah.value = data.namaSekolah || '';
      form.tempatSekolah.value = data.tempatSekolah || '';
      form.namaKepsek.value = data.namaKepsek || '';
      form.jabatanKepsek.value = data.jabatanKepsek || 'Kepala Sekolah';
      form.nipKepsek.value = data.nipKepsek || '';
      form.pangkatKepsek.value = data.pangkatKepsek || '';
      form.namaBendahara.value = data.namaBendahara || '';
      form.nipBendahara.value = data.nipBendahara || '';
      form.pangkatBendahara.value = data.pangkatBendahara || '';
      form.kop1.value = data.kop1 || '';
      form.kop2.value = data.kop2 || '';
      form.kop3.value = data.kop3 || '';
      form.kop4.value = data.kop4 || '';
      form.kop5.value = data.kop5 || '';
      form.idLogo.value = data.idLogo || '';
    };

    if (GLOBAL_MASTER.sekolah) {
      isiForm(GLOBAL_MASTER.sekolah);
    } else {
      google.script.run.withSuccessHandler(function(data) {
        GLOBAL_MASTER.sekolah = data;
        localStorage.setItem('CACHE_SEKOLAH', JSON.stringify(data)); // Kunci Sinkronisasi Local Cache
        isiForm(data);
      }).ambilDataSekolah(getToken());
    }
  }

function prosesSimpanSekolah() {
    showLoading("Menyimpan Data Sekolah...");
    const dataForm = formKeObjek('formSekolah');
    const token = getToken();

    google.script.run.withSuccessHandler(function(res) {
      closeLoading();
      if (res.success) {
        showSuccess(res.message);
        GLOBAL_MASTER.sekolah = null;

        // [MAGIC: CACHE LOKAL] Paksa panggil ulang data dari server untuk perbarui localStorage
        const btnRefresh = document.querySelector('.card-header-custom .btn-outline-success');
        if(btnRefresh) {
            refreshDataSekolah(btnRefresh);
        } else {
            // Fallback jika tombol tidak ditemukan di DOM
            google.script.run.withSuccessHandler(data => {
                GLOBAL_MASTER.sekolah = data;
                localStorage.setItem('CACHE_SEKOLAH', JSON.stringify(data));
            }).ambilDataSekolah(getToken(), true);
        }
        
      } else {
        showError(res.message);
      }
    }).simpanDataSekolah(dataForm, token); 
  }

function refreshDataSekolah(btn) {
  const icon = btn.querySelector('i');
  icon.classList.add('fa-spin');

  google.script.run.withSuccessHandler(function(data) {
    GLOBAL_MASTER.sekolah = data; 
    
    // [MAGIC: CACHE LOKAL] Timpa data lama dengan data baru yang baru saja ditarik
    localStorage.setItem('CACHE_SEKOLAH', JSON.stringify(data));

    loadSekolah(); 
    
    const elApp = document.getElementById('appName');
    if (elApp) {
         elApp.innerText = data.kop3 || "BELUM ADA NAMA";
    }
    
    icon.classList.remove('fa-spin'); 
    showSuccess("Data berhasil diperbaharui.");
  }).ambilDataSekolah(getToken(), true);
}

  function _safeShowModal(modalId) {
    const el = document.getElementById(modalId);
    if (el) {
      const modal = bootstrap.Modal.getOrCreateInstance(el);
      modal.show();
    } else {
      console.error("Modal ID tidak ditemukan:", modalId);
    }
  }

  function bukaModalGuruBaru() {
    document.getElementById('formGuru').reset();
    document.getElementById('idGuruHidden').value = "";
    document.querySelector('#modalGuru .modal-title').innerText = "Tambah Guru / Staff";
    _safeShowModal('modalGuru');
  }

  function editGuru(id) {
    const guru = GLOBAL_MASTER.guru.find(g => g.id === id);
    if (!guru) return;

    const f = document.getElementById('formGuru');
    document.getElementById('idGuruHidden').value = guru.id;
    f.namaGuru.value = guru.nama;
    f.nipGuru.value = guru.nip;
    f.pangkatGuru.value = guru.pangkat;
    f.jenisGuru.value = guru.jenis;

    if (guru.tglLahir) {
      const parts = guru.tglLahir.split('/');
      if (parts.length === 3) f.tglLahirGuru.value = `${parts[2]}-${parts[1]}-${parts[0]}`;
    }

    document.querySelector('#modalGuru .modal-title').innerText = "Edit Data Guru";
    _safeShowModal('modalGuru');
  }

  function loadDaftarGuru() {
    const tbody = document.getElementById('tabel-guru-body');
    const btnHapus = document.getElementById('btnHapusMasal');

    if (btnHapus) btnHapus.style.display = 'none';
    const cbAll = document.getElementById('checkAllGuru');
    if (cbAll) cbAll.checked = false;

    const renderTable = (list) => {
      tbody.innerHTML = '';
      if (list.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center">Belum ada data.</td></tr>';
        return;
      }

      list.forEach((guru, index) => {
        tbody.innerHTML += `<tr>
             <td class="text-center">
                <input type="checkbox" class="form-check-input cb-guru" value="${guru.id}" onchange="cekStatusHapus()">
             </td>
             <td class="text-center">${index + 1}</td>
             <td class="fw-bold">${guru.nama}</td>
             <td>${guru.nip}</td>
             <td>${guru.pangkat}</td>
             <td><span class="badge bg-info text-dark">${guru.jenis}</span></td>
             <td class="text-center">
                 <button class="btn btn-sm btn-outline-warning" onclick="editGuru('${guru.id}')"><i class="fas fa-edit"></i></button> 
                 <button class="btn btn-sm btn-outline-danger" onclick="hapusGuru('${guru.id}', '${guru.nama}')"><i class="fas fa-trash"></i></button>
             </td>
          </tr>`;
      });
    };

    if (GLOBAL_MASTER.guru && GLOBAL_MASTER.guru.length > 0) renderTable(GLOBAL_MASTER.guru);
    else {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center py-3"><div class="spinner-border spinner-border-sm"></div> Memuat...</td></tr>';
      google.script.run.withSuccessHandler(function(data) {
        GLOBAL_MASTER.guru = data;
        renderTable(data);
      }).getDaftarGuru(getToken());
    }
  }

  function toggleAllGuru(source) {
    const checkboxes = document.querySelectorAll('.cb-guru');
    checkboxes.forEach(cb => cb.checked = source.checked);
    cekStatusHapus();
  }

  function cekStatusHapus() {
    const terpilih = document.querySelectorAll('.cb-guru:checked').length;
    const btn = document.getElementById('btnHapusMasal');
    const counter = document.getElementById('countHapus');

    if (btn && counter) {
      if (terpilih > 0) {
        btn.style.display = 'inline-block';
        counter.innerText = terpilih;
      } else {
        btn.style.display = 'none';
      }
    }
  }

  function konfirmasiHapusMasal() {
    const checkboxes = document.querySelectorAll('.cb-guru:checked');
    const listID = Array.from(checkboxes).map(cb => cb.value);

    if (listID.length === 0) return;

    Swal.fire({
      title: 'Hapus Data Terpilih?',
      text: `Anda akan menghapus ${listID.length} data guru secara permanen!`,
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#d33',
      confirmButtonText: 'Ya, Hapus Semua!'
    }).then((result) => {
      if (result.isConfirmed) {
        showLoading(`Menghapus ${listID.length} data...`);
        google.script.run.withSuccessHandler(function(res) {
          closeLoading();
          if (res.success) {
            showSuccess(res.message);
            GLOBAL_MASTER.guru = null;
            loadDaftarGuru();
          } else {
            showError(res.message);
          }
        }).hapusGuruBanyak(listID, getToken());
      }
    });
  }

function handleSimpanGuru(e) {
    e.preventDefault();
    const isEdit = document.getElementById('idGuruHidden').value !== "";

    showLoading(isEdit ? "Memperbarui..." : "Menyimpan...");
    
    const dataForm = formKeObjek('formGuru');
    const token = getToken();

    const runner = google.script.run.withSuccessHandler(function(res) {
      closeLoading();
      if (res.success) {
        const elModal = document.getElementById('modalGuru');
        const modal = bootstrap.Modal.getInstance(elModal);
        if (modal) modal.hide();

        document.getElementById('formGuru').reset();
        document.getElementById('idGuruHidden').value = "";
        
        GLOBAL_MASTER.guru = null;
        loadDaftarGuru();
        
        showSuccess(res.message);
      } else showError(res.message);
    });

    if (isEdit) runner.updateGuru(dataForm, token);
    else runner.tambahGuru(dataForm, token);
  }

  function hapusGuru(id, nama) {
    Swal.fire({
      title: 'Hapus Guru?',
      text: `Yakin hapus ${nama}?`,
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: 'Hapus'
    }).then((result) => {
      if (result.isConfirmed) {
        showLoading("Menghapus...");
        google.script.run.withSuccessHandler(function(res) {
          closeLoading();
          if (res.success) {
            GLOBAL_MASTER.guru = null;
            loadDaftarGuru();
            showSuccess(res.message);
          } else showError(res.message);
        }).hapusGuru(id, getToken());
      }
    });
  }

function editTTD(nip) {
    const ttd = GLOBAL_MASTER.ttd.find(t => t.nip == nip);
    if (!ttd) return;

    const f = document.querySelector('#modalTTD form');
    if (f) {
      f.nipLama.value = ttd.nip;
      f.namaTTD.value = ttd.nama;
      f.nipTTD.value = ttd.nip;
      f.jabatanTTD.value = ttd.jabatan;
      document.querySelector('#modalTTD .modal-title').innerText = "Edit Pejabat";
      _safeShowModal('modalTTD'); 
    }
  }

function loadDaftarTTD() {
    const tbody = document.getElementById('tabel-ttd-body');
    const renderTable = (list) => {
      tbody.innerHTML = '';
      if (list.length == 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center">Belum ada data.</td></tr>';
        return;
      }
      list.forEach(item => {
        tbody.innerHTML += `<tr><td>${item.nama}</td><td>${item.nip}</td><td>${item.jabatan}</td><td class="text-center"><button class="btn btn-sm btn-outline-warning" onclick="editTTD('${item.nip}')"><i class="fas fa-edit"></i></button> <button class="btn btn-sm btn-outline-danger" onclick="hapusTTD('${item.nip}')"><i class="fas fa-trash"></i></button></td></tr>`;
      });
    };
    
    const token = getToken();

    if (GLOBAL_MASTER.ttd && GLOBAL_MASTER.ttd.length > 0) renderTable(GLOBAL_MASTER.ttd);
    else {
      tbody.innerHTML = '<tr><td colspan="4" class="text-center">Memuat...</td></tr>';
      google.script.run.withSuccessHandler(data => {
        GLOBAL_MASTER.ttd = data;
        renderTable(data);
      }).getDaftarTTD(token); 
    }
  }

function handleSimpanTTD(e) {
    e.preventDefault();
    const nipLamaEl = document.getElementById('nipLamaTTD');
    const isEdit = nipLamaEl && nipLamaEl.value !== "";
    const token = getToken();

    const dataForm = {};
    const fd = new FormData(e.target);
    fd.forEach((value, key) => dataForm[key] = value);

    showLoading("Menyimpan...");
    
    const runner = google.script.run.withSuccessHandler(() => {
      closeLoading();
      
      const elModal = document.getElementById('modalTTD');
      const modal = bootstrap.Modal.getInstance(elModal);
      if (modal) modal.hide();

      e.target.reset();
      GLOBAL_MASTER.ttd = null;
      loadDaftarTTD();
      showSuccess("Berhasil.");
    });

    if (isEdit) runner.updateTTD(dataForm, token);
    else runner.tambahTTD(dataForm, token);         
  }

function hapusTTD(nip) {
    Swal.fire({
      title: 'Hapus Pejabat?',
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: 'Hapus'
    }).then((result) => {
      if (result.isConfirmed) {
        showLoading("Menghapus...");
        google.script.run.withSuccessHandler(function(res) {
          closeLoading();
          if (res.success) {
            GLOBAL_MASTER.ttd = null;
            loadDaftarTTD();
            showSuccess(res.message);
          } else showError(res.message);
        }).hapusTTD(nip, getToken()); 
      }
    });
  }

function editJenis(kode) {
    const j = GLOBAL_MASTER.jenis.find(x => x.kode == kode);
    if (!j) return;
    const f = document.querySelector('#modalJenis form');
    if (f) {
      f.kodeLama.value = j.kode;
      f.kodeJenis.value = j.kode;
      f.namaJenis.value = j.nama;
      document.querySelector('#modalJenis .modal-title').innerText = "Edit Jenis Surat";
      _safeShowModal('modalJenis');
    }
  }

function loadJenisSurat() {
    const tbody = document.getElementById('tabel-jenis-body');
    const renderTable = (list) => {
      tbody.innerHTML = '';
      if (list.length == 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="text-center">Belum ada data.</td></tr>';
        return;
      }
      list.forEach(item => {
        tbody.innerHTML += `<tr><td class="fw-bold">${item.kode}</td><td>${item.nama}</td><td class="text-center"><button class="btn btn-sm btn-outline-warning" onclick="editJenis('${item.kode}')"><i class="fas fa-edit"></i></button> <button class="btn btn-sm btn-outline-danger" onclick="hapusJenis('${item.kode}')"><i class="fas fa-trash"></i></button></td></tr>`;
      });
    };

    const token = getToken(); 

    if (GLOBAL_MASTER.jenis && GLOBAL_MASTER.jenis.length > 0) renderTable(GLOBAL_MASTER.jenis);
    else {
      tbody.innerHTML = '<tr><td colspan="3" class="text-center">Memuat...</td></tr>';
      google.script.run.withSuccessHandler(data => {
        GLOBAL_MASTER.jenis = data;
        renderTable(data);
      }).getJenisSurat(token); 
    }
  }

function handleSimpanJenis(e) {
e.preventDefault();
const kodeLamaEl = document.getElementById('kodeLamaJenis');
const isEdit = kodeLamaEl && kodeLamaEl.value !== "";
const token = getToken();

const form = e.target;
const dataForm = {};
const fd = new FormData(form);
for (let [k, v] of fd.entries()) {
    dataForm[k] = v;
}

showLoading("Menyimpan...");

const runner = google.script.run.withSuccessHandler(() => {
  closeLoading();
  
  const elModal = document.getElementById('modalJenis');
  const modal = bootstrap.Modal.getInstance(elModal);
  if (modal) modal.hide();

  e.target.reset();
  GLOBAL_MASTER.jenis = null;
  loadJenisSurat(); 
  showSuccess("Berhasil.");
});

if (isEdit) runner.updateJenisSurat(dataForm, token); 
else runner.tambahJenisSurat(dataForm, token);        
}

function hapusJenis(kode) {
    Swal.fire({
      title: 'Hapus Jenis?',
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: 'Hapus'
    }).then((result) => {
      if (result.isConfirmed) {
        showLoading("Menghapus...");
        google.script.run.withSuccessHandler(function(res) {
          closeLoading();
          if (res.success) {
            GLOBAL_MASTER.jenis = null;
            loadJenisSurat();
            showSuccess(res.message);
          } else showError(res.message);
        }).hapusJenisSurat(kode, getToken()); 
      }
    });
  }

  function bukaFormSurat() {
    document.getElementById('view-surat-tabel').style.display = 'none';
    document.getElementById('view-surat-form').style.display = 'block';
    document.getElementById('formSurat').reset();
    document.getElementById('idEdit').value = "";
    document.getElementById('container-personil').innerHTML = '';
    document.getElementById('checkSPPD').checked = false;
    toggleSPPD();
    loadFormDependencies();
  }

  function tutupFormSurat() {
    document.getElementById('view-surat-form').style.display = 'none';
    document.getElementById('view-surat-tabel').style.display = 'block';
  }

  function refreshInputForm() {
    const btn = document.querySelector('[onclick="refreshInputForm()"] i');
    if (btn) btn.classList.add('fa-spin');

    const curJenis = document.getElementById('dropdownJenis').value;
    const curTTD = document.getElementById('dropdownTTD').value;

    google.script.run.withSuccessHandler(function(data) {
      GLOBAL_MASTER = data;
      populateFormDropdowns();

      if (curJenis) document.getElementById('dropdownJenis').value = curJenis;
      if (curTTD) document.getElementById('dropdownTTD').value = curTTD;

      if (btn) btn.classList.remove('fa-spin');
      showSuccess("Data Master Diperbarui (Input Aman).");
 }).getAllMasterData(getToken());
  }

  function resetFormManual() {
    Swal.fire({
      title: 'Kosongkan Form?',
      text: "Semua isian akan dihapus (kecuali settingan default).",
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#d33',
      cancelButtonColor: '#3085d6',
      confirmButtonText: 'Ya, Kosongkan',
      cancelButtonText: 'Batal'
    }).then((result) => {
      if (result.isConfirmed) {
        document.getElementById('formSurat').reset();
        document.getElementById('idEdit').value = "";
        document.getElementById('container-personil').innerHTML = '';
        populateFormDropdowns();
        document.getElementById('checkSPPD').checked = false;
        toggleSPPD();
        showSuccess("Form telah dikosongkan.");
      }
    });
  }

  function loadFormDependencies() {
    if (!GLOBAL_MASTER.guru || GLOBAL_MASTER.guru.length === 0) {
      google.script.run.withSuccessHandler(function(data) {
        GLOBAL_MASTER = data;
        populateFormDropdowns();
      }).getAllMasterData(getToken());
    } else populateFormDropdowns();
  }

  function populateFormDropdowns() {
    REF_DATA.guru = GLOBAL_MASTER.guru.map(g => {
      return {
        label: `${g.nama} (${g.jenis})`,
        detail: `NIP: ${g.nip}`,
        value: JSON.stringify({
          id: g.id,
          nama: g.nama,
          nip: g.nip,
          pangkat: g.pangkat,
          jenis: g.jenis
        })
      };
    });

    const selJenis = document.getElementById('dropdownJenis');
    selJenis.innerHTML = '<option value="">- Pilih Jenis Surat -</option>';
    GLOBAL_MASTER.jenis.forEach(j => {
      selJenis.innerHTML += `<option value="${j.kode}">${j.nama}</option>`;
    });

    const selTTD = document.getElementById('dropdownTTD');
    selTTD.innerHTML = '<option value="">- Pilih Pejabat -</option>';
    GLOBAL_MASTER.ttd.forEach(t => {
      selTTD.innerHTML += `<option value="${t.nama}">${t.nama} (${t.jabatan})</option>`;
    });

    const inputTempat = document.getElementById('inputTempatBerangkat');
    if (GLOBAL_MASTER.sekolah) inputTempat.value = GLOBAL_MASTER.sekolah.tempatSekolah || '';

    const inputAnggaran = document.querySelector('input[name="bebanAnggaran"]');
    if (inputAnggaran && GLOBAL_MASTER.sekolah) {
      if (inputAnggaran.value.trim() === "") {
        inputAnggaran.value = "Dana BOS " + (GLOBAL_MASTER.sekolah.namaSekolah || "");
      }
    }

    const container = document.getElementById('container-personil');
    if (container.children.length === 0) { 
      container.innerHTML = '';
      addPersonilRow(true);
    }

  function addPersonilRow(isKetua = false) {
    const container = document.getElementById('container-personil');
    const index = container.children.length + 1;
    const label = isKetua ? '<span class="badge bg-primary">Ketua</span>' : `<span class="badge bg-secondary">Pengikut ${index-1}</span>`;

    const btnHapus = isKetua ? '' : `<button type="button" class="btn btn-outline-danger" onclick="this.closest('.row').remove(); hitungTotal();"><i class="fas fa-times"></i></button>`;

    let optionsGuru = '<option value="">- Pilih Personil -</option>';
    REF_DATA.guru.forEach(g => optionsGuru += `<option value='${g.value}'>${g.label}</option>`);

    const div = document.createElement('div');
    div.className = 'row g-2 mb-2 align-items-center border-bottom pb-2';

    div.innerHTML = `
      <div class="col-md-1 text-center">${label}</div>
      
      <div class="col-md-4">
         <select class="form-select form-select-sm" name="dataPersonil[]" required onchange="fillPersonDetails(this)">${optionsGuru}</select>
      </div>
      
      <div class="col-md-3">
         <input type="text" class="form-control form-control-sm border-primary" name="peranPersonil[]" placeholder="Jabatan/Peran">
      </div>

      <div class="col-md-3">
         <input type="text" class="form-control form-control-sm bg-light" name="displayNIP[]" placeholder="NIP" readonly>
      </div>
      
      <div class="col-md-1 text-end">${btnHapus}</div>
    `;

    hitungTotal();

  function fillPersonDetails(selectElem) {
    const row = selectElem.closest('.row');
    const inputNIP = row.querySelector('input[name="displayNIP[]"]');

    if (selectElem.value) {
      const data = JSON.parse(selectElem.value);
      inputNIP.value = data.nip;
    } else {
      inputNIP.value = '';
    }
  }

  function toggleSPPD() {
    const isChecked = document.getElementById('checkSPPD').checked;
    document.getElementById('blok-perjalanan').style.display = isChecked ? 'block' : 'none';
    document.getElementById('blok-sppd').style.display = isChecked ? 'block' : 'none';
  }

  function hitungLama() {
    const tglA = document.getElementById('tglBerangkat').value;
    const tglB = document.getElementById('tglKembali').value;
    const output = document.getElementById('lamaHari');
    if (tglA && tglB) {
      const diffTime = Math.abs(new Date(tglB) - new Date(tglA));
      output.value = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
    } else output.value = '';
    hitungTotal();
  }

  // --- [KOREKSI 1] LOGIKA HITUNG TOTAL DI FORM ---
  function hitungTotal() {
    const harian = parseFloat(document.getElementById('uangHarian').value) || 0;
    const transport = parseFloat(document.getElementById('biayaTransport').value) || 0;
    const akomodasi = parseFloat(document.getElementById('biayaAkomodasi').value) || 0;
    
    const hari = parseInt(document.getElementById('lamaHari').value) || 0;
    const jumlahOrang = document.querySelectorAll('select[name="dataPersonil[]"]').length || 1;
    
    // RUMUS SESUAI PERMINTAAN: (Jumlah Orang * Lama) * (Harian + Transport + Akomodasi)
    // NOTE: Ini menyebabkan Transport & Akomodasi dibayar berulang per hari. Jika salah, perbaiki di sini.
    const totalAkhir = (jumlahOrang * hari) * (harian + transport + akomodasi);
    
    document.getElementById('totalBiaya').value = "Rp " + totalAkhir.toLocaleString('id-ID');
  }

function handleSimpanSurat(e) {
    e.preventDefault();
    const idEdit = document.getElementById('idEdit').value;
    const mode = idEdit ? "UPDATE" : "BARU";

    Swal.fire({
      title: mode === "UPDATE" ? "Simpan Perubahan?" : "Simpan Surat?",
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: 'Ya'
    }).then((result) => {
      if (result.isConfirmed) {
        showLoading("Menyimpan...");
        
        const dataForm = formKeObjek('formSurat'); 
        const token = getToken();

        const runner = google.script.run.withSuccessHandler(function(response) {
          closeLoading();
          if (response.success) {
            showSuccess(response.message);
            
            document.getElementById('formSurat').reset();
            document.getElementById('container-personil').innerHTML = '';
            document.getElementById('idEdit').value = "";
            
            tutupFormSurat();
            loadTabelArsip(true);

          } else showError(response.message);
        }).withFailureHandler(function(err) {
          closeLoading();
          showError("Error: " + err);
        });

        if (mode === "UPDATE") runner.updateDataSurat(dataForm, token);
        else runner.simpanSuratBaru(dataForm, token);
      }
    });
  }

  const ROWS_PER_PAGE = 10;
  let CURRENT_PAGE = 1;
  let CACHE_DATA_SURAT = [];
  let DATA_TERFILTER = [];

  function loadTabelArsip(isSilent = false) { 
    const tbody = document.getElementById('tabel-arsip-body');

    if (!isSilent) {
      tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4"><div class="spinner-border spinner-border-sm"></div> Memuat arsip...</td></tr>';
    }

    google.script.run.withSuccessHandler(function(data) {
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-muted">Belum ada surat.</td></tr>';
        document.getElementById('info-halaman').innerText = "";
        document.getElementById('pagination-container').innerHTML = "";
        return;
      }

      CACHE_DATA_SURAT = data.sort((a, b) => {
        const tglA = a.tglSurat ? a.tglSurat.split('/').reverse().join('') : '';
        const tglB = b.tglSurat ? b.tglSurat.split('/').reverse().join('') : '';
        return tglB.localeCompare(tglA);
      });

      DATA_TERFILTER = CACHE_DATA_SURAT;
      if (!isSilent) CURRENT_PAGE = 1;

      renderTable();
    }).getArsipSurat(getToken());
  }

function refreshArsip(btnElement) {
    const icon = btnElement.querySelector('i');
    if (icon) icon.classList.add('fa-spin');

    google.script.run.withSuccessHandler(function(masterData) {
      console.log("Master Data Refreshed");
      GLOBAL_MASTER = masterData;

      google.script.run.withSuccessHandler(function(data) {
        const dataBaru = data || [];
        CACHE_DATA_SURAT = dataBaru.sort((a, b) => {
          const tglA = a.tglSurat ? a.tglSurat.split('/').reverse().join('') : '';
          const tglB = b.tglSurat ? b.tglSurat.split('/').reverse().join('') : '';
          return tglB.localeCompare(tglA);
        });

        DATA_TERFILTER = CACHE_DATA_SURAT;
        renderTable(); 

        if (icon) icon.classList.remove('fa-spin');
        showSuccess("Data Terupdate."); 

      }).getArsipSurat(getToken()); 

    }).getAllMasterData(getToken()); 
  }

  function getWarnaJenis(teks) {
    if (!teks) return 'bg-secondary';

    const warna = [
      'bg-primary', 'bg-success', 'bg-danger', 'bg-warning text-dark', 'bg-info text-dark', 
      'bg-indigo', 'bg-purple', 'bg-pink', 'bg-orange', 'bg-teal', 'bg-cyan', 'bg-lime', 
      'bg-maroon', 'bg-navy', 'bg-gold', 'bg-grape', 'bg-choco' 
    ];

    let hash = 0;
    for (let i = 0; i < teks.length; i++) {
      hash = teks.charCodeAt(i) + ((hash << 5) - hash);
    }

    const index = Math.abs(hash) % warna.length;
    return warna[index];
  }

  function renderTable() {
    const tbody = document.getElementById('tabel-arsip-body');
    tbody.innerHTML = '';
    const start = (CURRENT_PAGE - 1) * ROWS_PER_PAGE;
    const end = start + ROWS_PER_PAGE;
    const paginatedItems = DATA_TERFILTER.slice(start, end);

    if (paginatedItems.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">Data tidak ditemukan.</td></tr>';
      renderPagination();
      return;
    }

    paginatedItems.forEach((row, index) => {
      const originalIndex = CACHE_DATA_SURAT.findIndex(x => x.id === row.id);
      const globalIndex = start + index;
      const nomorUrut = DATA_TERFILTER.length - globalIndex;

      const badgeClass = getWarnaJenis(row.jenis);

      tbody.innerHTML += `
         <tr style="cursor:pointer;" ondblclick="lihatDetail(${originalIndex})">
               <td class="text-center">${nomorUrut}</td>
               <td class="text-center">
                   <span class="badge ${badgeClass} fw-normal">${row.jenis}</span>
               </td>
               <td>
                   <div>${row.nomor || 'Draft'}</div>
                   <div class="fw-bold">${row.tglSurat}</div>
               </td>
               <td>${row.ketua}</td>
               <td><div class="limit-text" title="${row.dasar}">${row.dasar}</div></td>
               <td><div class="limit-text" title="${row.keperluan}">${row.keperluan}</div></td>
               <td class="text-center">
                   <div class="btn-group btn-group-sm">
                       <button class="btn btn-outline-info" onclick="lihatDetail(${originalIndex})" title="Lihat Detail"><i class="fas fa-eye"></i></button>
                       <button class="btn btn-outline-warning" onclick="editSurat('${row.id}')" title="Edit"><i class="fas fa-edit"></i></button>
                       <button class="btn btn-outline-secondary" onclick="cetakSurat('${row.id}')" title="Cetak"><i class="fas fa-print"></i></button>
                       <button class="btn btn-outline-danger" onclick="hapusSurat('${row.id}')" title="Hapus"><i class="fas fa-trash"></i></button>
                   </div>
               </td>
         </tr>`;
    });
    renderPagination();
  }

  function renderPagination() {
    const totalRows = DATA_TERFILTER.length;
    const totalPages = Math.ceil(totalRows / ROWS_PER_PAGE);
    const container = document.getElementById('pagination-container');

    document.getElementById('info-halaman').innerText = totalRows > 0 ? `Halaman ${CURRENT_PAGE} dari ${totalPages} (${totalRows} data)` : '0 Data';
    container.innerHTML = '';

    const prevDis = CURRENT_PAGE === 1 ? 'disabled' : '';
    container.innerHTML += `<li class="page-item ${prevDis}"><a class="page-link" href="javascript:void(0)" onclick="gantiHalaman(${CURRENT_PAGE - 1})">Prev</a></li>`;

    let startPage = Math.max(1, CURRENT_PAGE - 2);
    let endPage = Math.min(totalPages, CURRENT_PAGE + 2);
    for (let i = startPage; i <= endPage; i++) {
      const active = i === CURRENT_PAGE ? 'active' : '';
      container.innerHTML += `<li class="page-item ${active}"><a class="page-link" href="javascript:void(0)" onclick="gantiHalaman(${i})">${i}</a></li>`;
    }

    const nextDis = CURRENT_PAGE === totalPages || totalPages === 0 ? 'disabled' : '';
    container.innerHTML += `<li class="page-item ${nextDis}"><a class="page-link" href="javascript:void(0)" onclick="gantiHalaman(${CURRENT_PAGE + 1})">Next</a></li>`;
  }

  function gantiHalaman(page) {
    const totalPages = Math.ceil(DATA_TERFILTER.length / ROWS_PER_PAGE);
    if (page < 1 || page > totalPages) return;
    CURRENT_PAGE = page;
    renderTable();
  }

  function filterTabelSurat(input) {
    const keyword = input.value.toLowerCase();
    DATA_TERFILTER = CACHE_DATA_SURAT.filter(row => (row.nomor + " " + row.ketua + " " + row.keperluan).toLowerCase().includes(keyword));
    CURRENT_PAGE = 1;
    renderTable();
  }

  // [SENIOR DEVS ADDITION] Fungsi Helper untuk menerjemahkan "Enter" menjadi tag baris baru HTML
  function nl2br(str) {
    if (typeof str === 'undefined' || str === null) return '';
    return String(str).replace(/\n/g, '<br>');
  }

  function lihatDetail(index) {
    const data = CACHE_DATA_SURAT[index];
    if (!data) return;

    const rp = (num) => "Rp " + new Intl.NumberFormat('id-ID').format(num || 0);
    const ada = (val) => val && val !== "" && val !== "-" && val !== 0 && val !== "0";

    let html = `<div class="container-fluid px-0">`;

    html += `
       <div class="alert alert-light border mb-3 py-2">
         <div class="d-flex justify-content-between align-items-center">
            <div>
              <span class="badge bg-secondary fw-normal mb-1">${data.jenis}</span>
              <div class="fs-5">${data.nomor || 'Belum Ada Nomor'}</div>
            </div>
            <div class="text-end">
              <div>Tanggal Surat</div>
              <div>${data.tglSurat}</div>
            </div>
         </div>
       </div>
     `;

    html += `
       <div class="mb-3">
         <div class="mb-1 text-decoration-underline">Dasar Surat :</div>
         <div class="mb-3">${nl2br(data.dasar)}</div>
         
         <div class="mb-1 text-decoration-underline">Keperluan :</div>
         <div>${nl2br(data.keperluan)}</div>
       </div>
       <hr class="my-3">
     `;

    if (data.dataLengkap) {
      try {
        const p = JSON.parse(data.dataLengkap);
        if (p.length > 0) {
          html += `<div class="mb-2 text-primary">Personil Ditugaskan</div>
                     <ul class="list-group mb-3 shadow-sm">`;
          p.forEach((x, i) => {
            const role = i === 0 ? '<span class="badge bg-warning text-dark fw-normal ms-2">Ketua</span>' : '';
            html += `
                <li class="list-group-item">
                  <div class="d-flex justify-content-between">
                    <div>
                      <div>${x.nama} ${role}</div>
                      <div>${x.nip} - ${x.pangkat || ''}</div>
                    </div>
                    <div class="text-end">${x.jabatan || ''}</div>
                  </div>
                </li>`;
          });
          html += `</ul>`;
        }
      } catch (e) {}
    }

    if (ada(data.tempatBerangkat) || ada(data.tempatTujuan) || ada(data.tglBerangkat)) {
      html += `<div class="mb-2 text-primary mt-4">Info Perjalanan</div>
                 <table class="table table-bordered mb-0">`; 

      if (ada(data.tempatBerangkat)) html += `<tr><td width="35%" class="bg-light">Berangkat dari</td><td>${data.tempatBerangkat}</td></tr>`;
      if (ada(data.tempatTujuan)) html += `<tr><td class="bg-light">Tujuan</td><td>${data.tempatTujuan}</td></tr>`;
      if (ada(data.tglBerangkat)) html += `<tr><td class="bg-light">Tanggal</td><td>${data.tglBerangkat} s.d ${data.tglKembali}</td></tr>`;
      if (ada(data.lama)) html += `<tr><td class="bg-light">Lama</td><td>${data.lama} Hari</td></tr>`;
      if (ada(data.alatAngkut)) html += `<tr><td class="bg-light">Kendaraan</td><td>${data.alatAngkut}</td></tr>`;

      html += `</table>`;
    }

    if (ada(data.noSPT) || ada(data.noSPPD) || ada(data.ttdNama)) {
      html += `<div class="mb-2 text-primary mt-4">Administrasi</div>
                 <table class="table table-bordered mb-0">`;

      if (ada(data.noSPT)) html += `<tr><td width="35%" class="bg-light">Nomor SPT</td><td>${data.noSPT}</td></tr>`;
      if (ada(data.noSPPD)) html += `<tr><td class="bg-light">Nomor SPPD</td><td>${data.noSPPD}</td></tr>`;
      if (ada(data.ttdNama)) html += `<tr><td class="bg-light">Pejabat TTD</td><td>${data.ttdNama}<br><span>${data.ttdNip}</span></td></tr>`;

      html += `</table>`;
    }

    if (ada(data.totalBiaya) || ada(data.anggaran)) {
      html += `<div class="mb-2 text-primary mt-4">Keuangan</div>
                 <div class="card bg-light border-0 p-3">`; 

      if (ada(data.anggaran)) html += `<div class="row mb-1"><div class="col-4">Sumber Dana:</div><div class="col-8">${data.anggaran}</div></div>`;
      if (ada(data.pembayaran)) html += `<div class="row mb-1"><div class="col-4">Pembayaran:</div><div class="col-8">${data.pembayaran}</div></div>`;

      if (ada(data.uangHarian) || ada(data.transport)) {

        if (ada(data.transport)) html += `<div class="row"><div class="col-4">Transport:</div><div class="col-8">${rp(data.transport)}</div></div>`;

      if (ada(data.totalBiaya)) {

      }

        html += `<div class="mt-2 pt-2 border-top text-end fst-italic">
                       Kuitansi: ${data.noKuitansi || '-'} (${data.tglKuitansi || '-'})

          <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Tutup</button>
        </div>
     </div>
 `;

  }

  function editSurat(idBaris) {
    const data = CACHE_DATA_SURAT.find(d => d.id === idBaris);
    if (!data) return showError("Data tidak ditemukan.");
    document.getElementById('view-surat-tabel').style.display = 'none';
    document.getElementById('view-surat-form').style.display = 'block';

    if (!GLOBAL_MASTER.guru || GLOBAL_MASTER.guru.length === 0) {
      showLoading("Menyiapkan Data...");
      google.script.run.withSuccessHandler(function(m) {
        GLOBAL_MASTER = m;
        closeLoading();
        populateFormDropdowns();
        fillFormEdit(data, idBaris);
      }).getAllMasterData();
    } else {
      populateFormDropdowns();
      fillFormEdit(data, idBaris);
    }
  }


  function fillFormEdit(data, idBaris) {
    const f = document.getElementById('formSurat');

    f.idEdit.value = idBaris;
    f.nomorSurat.value = data.nomor;
    f.kodeJenis.value = data.jenis;

    const parseDate = (str) => {
      if (!str) return '';
      const p = str.split('/');
      return p.length === 3 ? `${p[2]}-${p[1]}-${p[0]}` : '';
    };

    f.tglSurat.value = parseDate(data.tglSurat);
    f.dasarSurat.value = data.dasar;
    f.keperluan.value = data.keperluan;

    const isSPPD = (data.noSPPD && data.noSPPD !== '-') || (data.totalBiaya && data.totalBiaya !== 0);
    document.getElementById('checkSPPD').checked = isSPPD;
    toggleSPPD(); 

    if (isSPPD) {
      f.noSPT.value = data.noSPT;
      f.nomorSPPD.value = data.noSPPD;
      f.alatAngkut.value = data.alatAngkut;
      f.tempatBerangkat.value = data.tempatBerangkat;
      f.tempatTujuan.value = data.tempatTujuan;
      f.tglBerangkat.value = parseDate(data.tglBerangkat);
      f.tglKembali.value = parseDate(data.tglKembali);
      f.lamaHari.value = data.lama;
      f.bebanAnggaran.value = data.anggaran;
      f.untukPembayaran.value = data.pembayaran;
      
      f.uangHarian.value = data.uangHarian;
      f.biayaTransport.value = data.transport;
      f.biayaAkomodasi.value = data.akomodasi || 0;
      
      f.tglKuitansi.value = parseDate(data.tglKuitansi);
      f.noKuitansi.value = data.noKuitansi;

      const ttdSelect = document.getElementById('dropdownTTD');
      for (let i = 0; i < ttdSelect.options.length; i++) {
        if (ttdSelect.options[i].text.includes(data.ttdNama)) {
          ttdSelect.selectedIndex = i;
          break;
        }
      }
    }

    const container = document.getElementById('container-personil');
    container.innerHTML = ''; 

    if (data.dataLengkap) {
      try {
        const personil = JSON.parse(data.dataLengkap);
        personil.forEach((p, idx) => {
          addPersonilRow(idx === 0);

          const rows = container.querySelectorAll('.row');
          const currentRow = rows[rows.length - 1];

          const select = currentRow.querySelector('select[name="dataPersonil[]"]');
          let found = false;

          for (let opt of select.options) {
            if (!opt.value) continue;
            const optData = JSON.parse(opt.value);

            if (p.id && optData.id && p.id === optData.id) {
              select.value = opt.value;
              found = true;
            } 
            else if (!found) {
              const nipSurat = String(p.nip || "").trim();
              const nipMaster = String(optData.nip || "").trim();
              const namaSurat = String(p.nama || "").trim().toLowerCase();
              const namaMaster = String(optData.nama || "").trim().toLowerCase();
              
              if ((nipSurat === "-" || nipSurat === "") && (nipMaster === "-" || nipMaster === "")) {
                if (namaSurat === namaMaster) {
                  select.value = opt.value;
                  found = true;
                }
              } else if (nipSurat === nipMaster && namaSurat === namaMaster) {
                select.value = opt.value;
                found = true;
              }
            }

            if (found) {
              fillPersonDetails(select); 
              break; 
            }
          }

          const inputPeran = currentRow.querySelector('input[name="peranPersonil[]"]');
          if (inputPeran && p.peran) {
            inputPeran.value = p.peran;
          }
        });
      } catch (e) {
        console.error("Error parsing personil:", e);
      }
    }

    hitungTotal();
  }

  function hapusSurat(idBaris) {
    const elModal = document.getElementById('modalDetailSurat');
    const modalDetail = bootstrap.Modal.getInstance(elModal);
    if (modalDetail) modalDetail.hide();

    Swal.fire({
      title: 'Hapus Surat Ini?',
      text: "Data yang dihapus tidak bisa dikembalikan!",

          },

          confirmButtonText: 'HAPUS SEKARANG',
          confirmButtonColor: '#d33',

          preConfirm: (ketikan) => {
            if (ketikan !== 'RESET') {
              Swal.showValidationMessage('Kata kunci salah! Ketik RESET.');
            } else {
              return new Promise((resolve) => {
                google.script.run.withSuccessHandler((res) => {
                  resolve(res);
                }).resetDatabaseTotal(getToken());
              });
            }
          },
          allowOutsideClick: () => !Swal.isLoading()
        }).then((resAkhir) => {
          if (resAkhir.isConfirmed && resAkhir.value.success) {
            Swal.fire('Terhapus!', resAkhir.value.message, 'success');
            CACHE_DATA_SURAT = [];
            DATA_TERFILTER = [];
            renderTable();
          } else if (resAkhir.isConfirmed && !resAkhir.value.success) {
            Swal.fire('Gagal', resAkhir.value.message, 'error');
          }
        });
      }
    });
  }

  let DATA_SIAP_IMPORT = [];

  function bukaModalImport() {
    document.getElementById('inputExcel').value = '';
    batalImport();
    _safeShowModal('modalImportGuru');
  }

  function previewImport() {
    const rawText = document.getElementById('inputExcel').value;
    if (!rawText || rawText.trim() === "") {
      showError("Paste data dulu!");
      return;
    }

    const rows = rawText.trim().split('\n');
    const tbody = document.getElementById('tbody-preview-import');
    tbody.innerHTML = '';
    DATA_SIAP_IMPORT = [];

    let validCount = 0;

    rows.forEach((rowStr) => {
      let cols = rowStr.split('\t');
      if (cols.length >= 1 && cols[0].trim() !== "") {
        const nama = cols[0]?.trim() || "";
        let tgl = cols[1]?.trim() || "";
        const nip = cols[2]?.trim() || "-";
        const pangkat = cols[3]?.trim() || "-";

        let jenisRaw = cols[4] ? String(cols[4]).trim() : "";
        const jenis = jenisRaw !== "" ? jenisRaw : "Lainnya";

        DATA_SIAP_IMPORT.push([nama, tgl, nip, pangkat, jenis]);
        validCount++;

        tbody.innerHTML += `
                 <tr>
                    <td>${validCount}</td>
                    <td>${nama}</td>
                    <td>${tgl}</td>
                    <td>${nip}</td>
                    <td>${pangkat}</td>
                    <td><span class="badge bg-info text-dark">${jenis}</span></td>
                 </tr>
               `;
      }
    });

    if (validCount > 0) {
      document.getElementById('step-1-import').style.display = 'none';
      document.getElementById('step-2-import').style.display = 'block';
    } else {
      showError("Data tidak terbaca. Pastikan copy dari Excel.");
    }
  }

  function batalImport() {
    document.getElementById('step-2-import').style.display = 'none';
    document.getElementById('step-1-import').style.display = 'block';
    DATA_SIAP_IMPORT = [];
  }

  function eksekusiImport() {
    if (DATA_SIAP_IMPORT.length === 0) return;

    const btn = document.querySelector('[onclick="eksekusiImport()"]');
    const orgText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';
    btn.disabled = true;

    google.script.run.withSuccessHandler(function(res) {
      btn.innerHTML = orgText;
      btn.disabled = false;

      if (res.success) {
        showSuccess(res.message);

        const elModal = document.getElementById('modalImportGuru');
        const modal = bootstrap.Modal.getInstance(elModal);
        if (modal) modal.hide();

        document.getElementById('inputExcel').value = "";
        batalImport();

        GLOBAL_MASTER.guru = null;
        loadDaftarGuru();
      } else {
        showError(res.message);
      }
    }).prosesImportGuru(DATA_SIAP_IMPORT, getToken());
  }
</script>
