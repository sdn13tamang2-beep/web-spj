<script>
let HTML_SIAP_CETAK = "";
let CACHE_SALDO_BANK = 0;
let CACHE_SALDO_TUNAI = 0;

/* [SENIOR FIX] Fungsi Global Reset Form dengan Konfirmasi Keamanan */
function resetSeluruhFormBKU() {
  const confirmMsg = "Anda yakin ingin mereset seluruh form? Semua data sekolah, transaksi, dan preview akan dihapus.";
  
  if(typeof Swal !== 'undefined') {
    Swal.fire({
      title: 'Reset Seluruh Form?',
      text: confirmMsg,
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#d33',
      cancelButtonColor: '#3085d6',
      confirmButtonText: 'Ya, Reset!',
      cancelButtonText: 'Batal'
    }).then((result) => {
      if (result.isConfirmed) executeResetGlobal();
    });
  } else {
    if(confirm(confirmMsg)) executeResetGlobal();
  }

  function executeResetGlobal() {
    // 1. Reset seluruh input di dalam form (termasuk Identitas, Periode, Saldo)
    document.getElementById('formIdentitasBKU').reset();
    
    // 2. Kembalikan label saldo yang mungkin sudah di-overwrite oleh fungsi salinSaldoDariPreview
    document.getElementById('label-saldo-bank').innerHTML = 'Saldo Bank';
    document.getElementById('label-saldo-tunai').innerHTML = 'Saldo Tunai';
    
    // 3. Kosongkan Raw Data Transaksi
    document.getElementById('rawInputBKU').value = '';
    
    // 4. Kembalikan UI Upload PDF ke default
    const lbl = document.getElementById('labelNamaFile');
    if (lbl) {
        lbl.innerHTML = 'Otomatis mengekstrak tabel transaksi dari file PDF Anda';
        lbl.classList.remove('text-dark', 'fw-bold');
        lbl.classList.add('text-muted');
    }
    const fInput = document.getElementById('fileImportPDF');
    if(fInput) fInput.value = '';

    // 5. Sembunyikan dan kosongkan area preview cetak
    document.getElementById('bku-result-section').style.display = 'none';
    document.getElementById('preview-content-bku').innerHTML = '';
    HTML_SIAP_CETAK = ""; 
    CACHE_SALDO_BANK = 0;
    CACHE_SALDO_TUNAI = 0;
    
    // 6. Kunci kembali tombol Ambil Saldo
    document.getElementById('btn-ambil-saldo').disabled = true;

    if(typeof Swal !== 'undefined') {
      Swal.fire({ icon: 'success', title: 'Form Direset', showConfirmButton: false, timer: 1500 });
    }
  }
}

/* [SENIOR FIX] Generator Combo-Box Dropdown Bulan & Tahun Berjalan */
(function buildPeriodeDropdown() {
  const select = document.getElementById('dropdown-periode');
  if (!select) return;
  
  const currentYear = new Date().getFullYear();
  const months = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];
  
  months.forEach(m => {
    const opt = document.createElement('option');
    opt.value = `${m} TAHUN : ${currentYear}`;
    opt.textContent = `${m} TAHUN : ${currentYear}`; // Disamakan agar tidak membingungkan
    select.appendChild(opt);
  });
})();

/* --- FUNGSI TOGGLE UI --- */
function toggleTextareaBKU() {
  const wrapper = document.getElementById('wrapper-raw-input');
  const icon = document.getElementById('icon-toggle-bku');
  
  if (wrapper.style.display === 'none') {
    wrapper.style.display = 'block';
    icon.classList.replace('fa-chevron-right', 'fa-chevron-down');
  } else {
    wrapper.style.display = 'none';
    icon.classList.replace('fa-chevron-down', 'fa-chevron-right');
  }
}

/* --- [SENIOR FIX] FUNGSI TARIK DATA (ZERO LATENCY CACHE) --- */
function loadDataAwalBKU() {
  const f = document.getElementById('formIdentitasBKU');
  const s = GLOBAL_MASTER.sekolah; // Ambil dari cache lokal, bukan dari server!
  
  if (s) {
     // Isi field BKU
     f.npsn.value = s.npsn || "";
     f.namaSekolah.value = s.namaSekolah || "";
     
     const lokasiLengkap = (s.desa_pusat && s.kec_pusat) ? `${s.desa_pusat}, ${s.kec_pusat}` : s.tempatSekolah;
     f.lokasi.value = lokasiLengkap || "";
     f.kabupaten.value = s.kabupaten || "Kab. Sekadau";
     f.provinsi.value = s.provinsi || "Prov. Kalimantan Barat";
     
     // Setup Variabel Global TTD BKU agar terhubung ke fungsi cetak
     window.TTD_BKU = {
        kepsek: s.namaKepsek,
        nipKepsek: s.nipKepsek,
        bendahara: s.namaBendahara,
        nipBendahara: s.nipBendahara
     };
     
     if(typeof showSuccess === 'function') showSuccess("Data Ditarik (Instan)");
  } else {
     if(typeof showError === 'function') showError("Data Sekolah belum tersedia. Silahkan muat ulang aplikasi.");
  }
}

/* ==========================================
 * VISUAL LINE-BY-LINE PARSER (REFACTORED BY SENIOR)
 * ========================================== */
function handlePDFUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  const labelFile = document.getElementById('labelNamaFile');
  labelFile.innerHTML = `<i class="fas fa-spinner fa-spin text-danger"></i> Membedah Struktur Tabel PDF...`;
  labelFile.classList.replace('text-muted', 'text-dark');
  labelFile.classList.add('fw-bold');

  const reader = new FileReader();

  reader.onload = function(e) {
    const typedarray = new Uint8Array(e.target.result);
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    
    const loadingTask = pdfjsLib.getDocument(typedarray);
    loadingTask.promise.then(async function(pdf) {
      let transactions = [];

      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        labelFile.innerHTML = `<i class="fas fa-spinner fa-spin text-danger"></i> Ekstraksi Halaman ${pageNum}/${pdf.numPages}...`;
        await new Promise(r => setTimeout(r, 10)); 
        
        try {
            const page = await pdf.getPage(pageNum);
            const textContent = await page.getTextContent();
            
            let rawItems = textContent.items.map(i => ({
                text: i.str.trim(),
                x: i.transform[4],
                y: i.transform[5]
            })).filter(i => i.text !== '');

            let cutoffIndex = rawItems.findIndex(i => {
                let l = i.text.toLowerCase();
                return l.match(/^jumlah\s*[\d\.,\s]*$/) || l.includes("pada hari ini") || l.includes("buku kas umum ditutup");
            });
            if (cutoffIndex !== -1) {
                rawItems = rawItems.slice(0, cutoffIndex);
            }

            const noisePatterns = [
                /npsn\s*:/i, /nama sekolah\s*:/i, /desa\/kecamatan/i, /kabupaten \/ kota/i,
                /provinsi\s*:/i, /sumber dana/i, /buku kas umum\s*$/i, /bulan\s*:.*tahun\s*:/i,
                /^bku\s*$/i, /^tanggal\s*$/i, /^kode\s*kegiatan\s*$/i, /^kode\s*rekening\s*$/i,
                /^no\.?\s*bukti\s*$/i, /^uraian\s*$/i, /^penerimaan\s*$/i, /^pengeluaran\s*$/i, /^saldo\s*$/i,
                /^1\s+2\s+3\s+4\s+5\s+6\s+7\s+8\s*$/, /^halaman\s+\d+/i, /bku.*npsn/i
            ];

            let cleanItems = rawItems.filter(i => {
                let l = i.text.toLowerCase();
                return !noisePatterns.some(p => p.test(l));
            });

            let dateItems = cleanItems.filter(i => i.text.match(/^\d{2}[-/]\d{2}[-/]\d{4}$/) && i.x < 100);
            dateItems.sort((a, b) => b.y - a.y); 

            if (dateItems.length === 0) continue;

            for (let i = 0; i < dateItems.length; i++) {
                let topBoundary = dateItems[i].y + 12; 
                let bottomBoundary = (i + 1 < dateItems.length) ? (dateItems[i+1].y + 12) : -1;

                let rowBucket = cleanItems.filter(item => item.y <= topBoundary && item.y > bottomBoundary);
                rowBucket = rowBucket.filter(item => item !== dateItems[i]);

                rowBucket.sort((a, b) => {
                    if (Math.abs(a.x - b.x) < 5) return b.y - a.y; 
                    return a.x - b.x;
                });

                let rest = rowBucket.map(item => item.text).join(" ").replace(/\s+/g, " ").trim();
                
                let tokens = rest.split(" ");
                let numbers = [];
                
                while(tokens.length > 0) {
                    let last = tokens[tokens.length - 1];
                    if(last.match(/^[\d\.,]+$/) && !last.match(/^\d{2}\.\d{2}\.\d{2}\.$/)) {
                        if (numbers.length >= 3) break; 
                        if (last.match(/^\d{4}$/) && numbers.length >= 1) break;

                        numbers.unshift(last);
                        tokens.pop();
                    } else {
                        break; 
                    }
                }

                let middle = tokens.join(" ").trim();
                let masuk = "0", keluar = "0";

                if (numbers.length >= 3) {
                    masuk = numbers[numbers.length - 3];
                    keluar = numbers[numbers.length - 2];
                } else if (numbers.length === 2) {
                    masuk = numbers[0];
                    keluar = numbers[1];
                } else if (numbers.length === 1) {
                    masuk = numbers[0];
                }

                let keg = "", rek = "", bukti = "", uraian = middle;

                let mKeg = uraian.match(/\b(\d{2}\.\d{2}\.\d{2}\.)(?=\s|$)/);
                if (mKeg) { keg = mKeg[1]; uraian = uraian.replace(mKeg[0], " ").trim(); }

                let mBukti = uraian.match(/\b((?:BPU|BBU|BJU|BP|BK|TBP|STS|BPN|SSP)[\-\.]?\d+[A-Z0-9]*)\b/i);
                if (mBukti) { bukti = mBukti[1]; uraian = uraian.replace(mBukti[0], " ").trim(); }

                let mRek = uraian.match(/\b([1-9]\.\d\.\d{2}\.\d{2}\.\d{2}\.\d{2}(?:\s+\d{2})?)\b/);
                if (mRek) {
                    rek = mRek[1];
                    uraian = uraian.replace(mRek[0], " ").trim();
                    
                    let mDanglingStart = uraian.match(/^(\d{2})\b/);
                    if (mDanglingStart) {
                        rek += " " + mDanglingStart[1];
                        uraian = uraian.replace(mDanglingStart[0], " ").trim();
                    } else {
                        let mDanglingEnd = uraian.match(/\b(\d{2})$/);
                        if (mDanglingEnd) {
                            rek += " " + mDanglingEnd[1];
                            uraian = uraian.substring(0, uraian.length - mDanglingEnd[0].length).trim();
                        }
                    }
                }

                if (uraian.match(/^(\d{2})\s+/) && keg === "" && rek === "") {
                    uraian = uraian.replace(/^(\d{2})\s+/, "").trim();
                }

                uraian = uraian.replace(/\s+/g, ' ').trim();
                masuk = masuk.replace(/[^\d.,]/g, "").replace(/^0,0+$/, "0") || "0";
                keluar = keluar.replace(/[^\d.,]/g, "").replace(/^0,0+$/, "0") || "0";

                transactions.push({tgl: dateItems[i].text, keg, rek, bukti, uraian, masuk, keluar});
            }

        } catch (pageErr) {
            console.warn(`Gagal membaca halaman ${pageNum}`, pageErr);
        }
      }

      let tsvOutput = "";
      transactions.forEach(tx => {
          tsvOutput += `${tx.tgl}\t${tx.keg}\t${tx.rek}\t${tx.bukti}\t${tx.uraian}\t${tx.masuk}\t${tx.keluar}\n`;
      });

      document.getElementById('rawInputBKU').value = tsvOutput.trim();
      labelFile.innerHTML = `<i class="fas fa-check text-success"></i> Ekstrak Selesai: ${file.name}`;
      
      if(typeof Swal !== 'undefined') {
        Swal.fire('Ekstraksi Selesai', 'Data berhasil ditambahkan.', 'success');
      } else {
        alert("Ekstraksi Selesai!");
      }
      document.getElementById('fileImportPDF').value = ""; 

    }).catch(err => {
       console.error("Visual Parser Fatal Error:", err);
       if(typeof Swal !== 'undefined') Swal.fire('Error PDF', 'Gagal membedah struktur file.', 'error');
       labelFile.innerHTML = 'Otomatis mengekstrak tabel transaksi dari file PDF Anda';
       labelFile.classList.remove('text-dark', 'fw-bold');
       labelFile.classList.add('text-muted');
    });
  };

  reader.readAsArrayBuffer(file);
}

function salinSaldoDariPreview() {
  if (CACHE_SALDO_BANK === 0 && CACHE_SALDO_TUNAI === 0) {
    const previewArea = document.getElementById('preview-content-bku').innerHTML;
    if (!previewArea) {
       return typeof Swal !== 'undefined' ? Swal.fire("Data Kosong", "Silakan 'Proses Data' terlebih dahulu.", "info") : alert("Data Kosong");
    } else {
       return typeof Swal !== 'undefined' ? Swal.fire("Info", "Saldo Akhir bernilai 0.", "info") : alert("Saldo 0");
    }
  }

  // Tangkap periode SEBELUM form dikosongkan
  const periodeBulan = document.getElementById('input-periode').value.trim();

  const sBankFixed = parseFloat(CACHE_SALDO_BANK.toFixed(2));
  const sTunaiFixed = parseFloat(CACHE_SALDO_TUNAI.toFixed(2));

  document.getElementById('input-saldo-bank').value = sBankFixed;
  document.getElementById('input-saldo-tunai').value = sTunaiFixed;

  // Modifikasi label agar mencatat riwayat bulan saldo
  if (periodeBulan) {
    document.getElementById('label-saldo-bank').innerHTML = `Saldo Bank : <span class="text-primary">${periodeBulan}</span>`;
    document.getElementById('label-saldo-tunai').innerHTML = `Saldo Tunai : <span class="text-danger">${periodeBulan}</span>`;
  }

  const inputRaw = document.getElementById('rawInputBKU');
  inputRaw.value = '';
  
  document.getElementById('input-periode').value = '';
  document.getElementById('input-tgl-cetak').value = '';

  document.getElementById('bku-result-section').style.display = 'none';
  HTML_SIAP_CETAK = ""; 
  
  const lbl = document.getElementById('labelNamaFile');
  if (lbl) {
      lbl.innerHTML = 'Otomatis mengekstrak tabel transaksi dari file PDF Anda';
      lbl.classList.remove('text-dark', 'fw-bold');
      lbl.classList.add('text-muted');
  }
  const fInput = document.getElementById('fileImportPDF');
  if(fInput) fInput.value = '';

  document.getElementById('btn-ambil-saldo').disabled = true;

  if(typeof Swal !== 'undefined') {
      Swal.fire({
        icon: 'success',
        title: 'Saldo Disalin & Data Direset!',
        html: `Data siap untuk bulan berikutnya.<br><br>
               <b>Bank:</b> ${sBankFixed.toLocaleString('id-ID', { minimumFractionDigits: 2 })}<br>
               <b>Tunai:</b> ${sTunaiFixed.toLocaleString('id-ID', { minimumFractionDigits: 2 })}`,
        timer: 2500,
        showConfirmButton: false
      });
  }
}

function getFormData(formId) {
    const form = document.getElementById(formId);
    const formData = new FormData(form);
    const obj = {};
    formData.forEach((value, key) => obj[key] = value);
    return obj;
}

function generatePreviewBKU() {
  try {
    const f = getFormData('formIdentitasBKU');

    if (!f.npsn || f.npsn.trim() === "") {
      if(typeof Swal !== 'undefined') Swal.fire({ icon: 'warning', title: 'NPSN Kosong!' });
      document.querySelector('input[name="npsn"]').focus();
      return; 
    }
    
    if (!f.periode || f.periode.trim() === "") {
      if(typeof Swal !== 'undefined') Swal.fire({ icon: 'warning', title: 'Periode Kosong!' });
      document.querySelector('input[name="periode"]').focus();
      return; 
    }

    const raw = document.getElementById('rawInputBKU').value.trim();
    const sBankInput = document.getElementById('input-saldo-bank').value;
    const sTunaiInput = document.getElementById('input-saldo-tunai').value;
    
    if(!raw && !sBankInput && !sTunaiInput) {
       return typeof showError === 'function' ? showError("Data kosong!") : alert("Data kosong!");
    }

    const tglPicker = document.getElementById('input-tgl-cetak').value;
    
    if (!tglPicker) {
      if(typeof Swal !== 'undefined') Swal.fire({ icon: 'warning', title: 'Tanggal Cetak Kosong!' });
      document.getElementById('input-tgl-cetak').focus();
      return;
    }

    const dateObj = new Date(tglPicker);
    const namaHari = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
    const namaBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
    
    const stringHari = namaHari[dateObj.getDay()];
    const stringTanggal = `${dateObj.getDate()} ${namaBulan[dateObj.getMonth()]} ${dateObj.getFullYear()}`;
    
    const tglCetakParagraf = `${stringHari} ${stringTanggal}`;
    const tglCetakTTD = stringTanggal;

    const rows = parseExcelTSV(raw); 
    let saldo = 0, totalMasuk = 0, totalKeluar = 0, saldoBank = 0, saldoTunai = 0, trRows = "";

    const clean = (val) => {
      if (!val || val === "0" || val === "") return 0;
      let s = String(val).trim().replace(/\./g, "").replace(/,/g, ".");
      return parseFloat(s) || 0;
    };
    
    const fmt = (num) => num.toLocaleString('id-ID', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    const fmtStrict = (num) => num.toLocaleString('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    rows.forEach(cols => {
      if(cols.length < 5 || !cols[4]) return;

      const tgl = cols[0] || "";
      const kdKeg = cols[1] || "";
      const rawKdRek = cols[2] || "";
      const kdRekHTML = rawKdRek.replace(/\n/g, "<br>"); 
      const bukti = (cols[3] || "").replace(/\n/g, " ");
      const uraianOriginal = (cols[4] || "").replace(/\n/g, " ");
      
      const uraianClean = uraianOriginal.replace(/\s+/g, ' ').trim(); 
      const uraian = uraianClean.toLowerCase();
      
      if (uraian.startsWith("jumlah") || uraian.startsWith("total")) return;
      
      let masuk = clean(cols[5]);
      let keluar = clean(cols[6]);

      if (!bukti && uraian.includes("saldo")) {
          if (uraian.includes("bank") && sBankInput !== "") masuk = parseFloat(sBankInput) || 0;
          else if ((uraian.includes("tunai") || uraian.includes("kas")) && sTunaiInput !== "") masuk = parseFloat(sTunaiInput) || 0;
      }
      
      saldo = saldo + masuk - keluar;
      totalMasuk += masuk;
      totalKeluar += keluar;

      const isTransaksiBank = (rawKdRek.replace(/[\n\r\t ]/g, "").trim() === "");

      if (isTransaksiBank) {
        if (masuk > 0) {
          if (uraian.includes("saldo") && (uraian.includes("tunai") || uraian.includes("kas")) || uraian.includes("pergeseran")) {
            saldoTunai += masuk;
          } else {
            saldoBank += masuk;
          }
        }
        if (keluar > 0) saldoBank -= keluar;
      } else {
        if (masuk > 0) saldoTunai += masuk;
        if (keluar > 0) saldoTunai -= keluar;
      }

      trRows += `
        <tr>
          <td class="text-center">${tgl}</td>
          <td class="text-center">${kdKeg}</td>
          <td class="text-center">${kdRekHTML}</td>
          <td class="text-center">${bukti}</td>
          <td style="text-align:justify;">${uraianOriginal}</td>
          <td class="text-end">${masuk !== 0 ? fmt(masuk) : '0'}</td>
          <td class="text-end">${keluar !== 0 ? fmt(keluar) : '0'}</td>
          <td class="text-end fw-bold">${fmt(saldo)}</td>
        </tr>`;
    });

    CACHE_SALDO_BANK = saldoBank;
    CACHE_SALDO_TUNAI = saldoTunai;

    trRows += `
      <tr style="font-weight:bold; background-color:#f8f9fa;">
        <td colspan="5" class="text-center">JUMLAH</td>
        <td class="text-end">${fmt(totalMasuk)}</td>
        <td class="text-end">${fmt(totalKeluar)}</td>
        <td class="text-end">${fmt(saldo)}</td>
      </tr>`;

    let kepsek = "", nipK = "", ben = "", nipB = "", lokasi = "";
    if(window.TTD_BKU) {
      kepsek = window.TTD_BKU.kepsek || ""; nipK = window.TTD_BKU.nipKepsek || "";
      ben = window.TTD_BKU.bendahara || ""; nipB = window.TTD_BKU.nipBendahara || "";
      
      let rawLokasi = f.lokasi; 
      let kecamatanOnly = rawLokasi; 
      if (rawLokasi.includes(",")) {
         const parts = rawLokasi.split(",");
         if (parts.length > 1) kecamatanOnly = parts[1].trim(); 
      }
      lokasi = `${kecamatanOnly}, ${tglCetakTTD}`; 
    }

    const finalHTML = `
      <div id="print-bku-wrapper">
        <style>
          @page { 
            size: A4 landscape; 
            margin: 15mm 5mm 5mm 5mm; 
          }
          
          * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
          
          #print-bku-wrapper { font-family: 'Arial', sans-serif; color: black; width: 100%; font-size: 8pt; }
          .header-title { text-align: center; text-transform: uppercase; font-weight: bold; margin-bottom: 10px; }
          .header-title h1 { font-size: 11pt; text-decoration: underline; margin: 0 0 2px 0; }
          .header-title h2 { font-size: 9pt; margin: 0; font-weight: bold; }
          
          .header-info { width: 100%; margin-bottom: 5px; position: relative; font-size: 8pt;}
          .header-info td { vertical-align: top; padding: 1px 0; font-weight: bold; }
          /* [SENIOR FIX] Perlebar label-cell agar Kabupaten / Kota tidak turun menjadi dua baris */
          .label-cell { width: 130px; white-space: nowrap; }
          .box-bku { position: absolute; top: 0; right: 0; border: 2px solid black; padding: 2px 8px; font-weight: bold; font-size: 9pt; }
          
          .tbl-bku { width: 100%; border-collapse: collapse; table-layout: fixed; }
          .tbl-bku th, .tbl-bku td { border: 1px solid black; padding: 2px 3px; word-wrap: break-word; vertical-align: middle !important; }
          .tbl-bku tr { page-break-inside: avoid; break-inside: avoid; }
          .thead-text th { text-align: center; font-weight: bold; background-color: #fff; border-bottom: none; font-size: 8pt; }
          .col-number td { text-align: center; font-style: italic; background-color: #ddd; font-weight: bold; border-top: 1px solid black; font-size: 7pt; }
          
          .text-center { text-align: center; } 
          .text-end { text-align: right; } 
          .fw-bold { font-weight: bold; }
          
          .closing-block { page-break-inside: avoid; margin-top: 10px; }
          
          @media print {
            body > *:not(#print-area) { display: none !important; }
            #print-area { display: block !important; position: absolute; top: 0; left: 0; width: 100%; }
            .tbl-header-wrapper { page-break-after: avoid; }
            thead { display: table-header-group; } 
          }
        </style>

        <div class="header-title">
          <h1><strong>BUKU KAS UMUM</strong></h1>
          <h2>BULAN : ${f.periode.toUpperCase()}</h2>
        </div>

        <div class="header-info">
          <div class="box-bku">BKU</div>

function eksekusiCetakBKU() {
  if (!HTML_SIAP_CETAK) return;
  const area = document.getElementById('print-area');
  
  if(!area) {
     if(typeof Swal !== 'undefined') Swal.fire('Error', 'Elemen <div id="print-area"></div> tidak ditemukan di Body HTML Anda!', 'error');
     else alert('Error: Elemen print-area tidak ditemukan!');
     return;
  }
  
  area.innerHTML = HTML_SIAP_CETAK;
  
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      window.print();
    });
  });
}

function parseExcelTSV(str) {
  try {
    const result = [];
    let row = [''];
    let inQuotes = false;
    let i = 0;
    while (i < str.length) {
      const char = str[i];
      const next = str[i+1];
      if (char === '"') {
        if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; }
        else inQuotes = !inQuotes;
      } else if (char === '\t' && !inQuotes) row.push('');
      else if (char === '\n' && !inQuotes) { result.push(row); row = ['']; }
      else if (char !== '\r') row[row.length - 1] += char;
      i++;
    }
    if (row.length > 1 || row[0] !== '') result.push(row);
    return result;
  } catch (err) {
    console.error("TSV Parser Error:", err);
    throw new Error("Gagal memecah format data Excel. Silakan periksa kembali tabel yang di-copy.");
  }
}
