<div id="page-kuitansi-umum" class="page-section" style="display:none;">
  <div class="card shadow-sm mb-4">
    <div class="card-header-custom d-flex justify-content-between align-items-center bg-white p-3">
      <div class="card-title mb-0"><i class="fas fa-receipt me-2 text-primary"></i> Kuitansi ATK DLL</div>
      <button type="button" class="btn btn-success fw-bold" onclick="prosesCetakKuitansiUmum()">
        <i class="fas fa-print me-2"></i> Cetak Kuitansi
      </button>
    </div>
    <div class="card-body">
      <form id="formKuitansiUmum">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label small fw-bold">Nomor BPU</label>
            <input type="text" class="form-control" name="noBpu" id="inputNoBpu">
          </div>
          <div class="col-md-4">
            <label class="form-label small fw-bold">Kode Rekening Kegiatan</label>
            <input type="text" class="form-control" name="kodeRek" id="inputKodeRek">
          </div>
          <div class="col-md-4">
            <label class="form-label small fw-bold">Tanggal Kuitansi</label>
            <input type="date" class="form-control" name="tglKuitansi" id="tglKuitansiUmum">
          </div>

          <div class="col-md-6">
            <label class="form-label small fw-bold">Nama Penerima / Pembayar</label>
            <input type="text" class="form-control" name="penerima" placeholder="Ketik nama di sini...">
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-bold">Jumlah Uang (Angka)</label>
            <div class="input-group">
              <span class="input-group-text">Rp</span>
              <input type="number" class="form-control fw-bold" name="jumlah" id="inputJumlah" oninput="updateTerbilangRapi()">
            </div>
          </div>
          
          <div class="col-md-12">
            <label class="form-label small fw-bold text-primary">Terbilang (Otomatis)</label>
            <textarea class="form-control bg-light fw-bold" id="displayTerbilang" readonly rows="1" style="font-style: italic;"></textarea>
          </div>

          <div class="col-md-12">
            <label class="form-label small fw-bold">Untuk Pembayaran</label>
            <textarea class="form-control" name="uraian" rows="2" placeholder="Uraian pembayaran..."></textarea>
          </div>
          <div class="col-md-12">
            <label class="form-label small fw-bold">Sumber Dana (Dibebankan Pada)</label>
            <input type="text" class="form-control" name="sumberDana" id="inputSumberDana">
          </div>

          <div class="col-md-6 border-end pt-3">
            <label class="form-label small fw-bold">Kepala Sekolah</label>
            <input type="text" class="form-control mb-2 fw-bold" name="namaKepsek" id="ksNama">
            <input type="text" class="form-control small" name="nipKepsek" id="ksNip">
          </div>
          <div class="col-md-6 pt-3">
            <label class="form-label small fw-bold">Bendahara BOS</label>
            <input type="text" class="form-control mb-2 fw-bold" name="namaBendahara" id="bdNama">
            <input type="text" class="form-control small" name="nipBendahara" id="bdNip">
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
