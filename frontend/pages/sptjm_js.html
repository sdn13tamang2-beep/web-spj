<script>
let HTML_SIAP_CETAK_SPTJM = "";

// --- Murni UI Toggle ---
function toggleTextareaSPTJM() {
  const wrapper = document.getElementById('wrapper-raw-sptjm');
  const icon = document.getElementById('icon-toggle-sptjm');
  if (wrapper.style.display === 'none') {
    wrapper.style.display = 'block';
    icon.classList.replace('fa-chevron-right', 'fa-chevron-down');
  } else {
    wrapper.style.display = 'none';
    icon.classList.replace('fa-chevron-down', 'fa-chevron-right');
  }
}

// --- FUNGSI EKSTRAKSI PDF ---
function handlePDFUploadSPTJM(event) {
  const file = event.target.files[0];
  if (!file) return;

  const labelFile = document.getElementById('labelFileSPTJM');
  labelFile.innerHTML = `<i class="fas fa-spinner fa-spin text-danger"></i> Mengekstrak teks, identitas, dan koordinat angka dari PDF...`;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    const typedarray = new Uint8Array(e.target.result);
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    
    pdfjsLib.getDocument(typedarray).promise.then(async function(pdf) {
      let fullText = "";
      let spatialItems = []; 

      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page = await pdf.getPage(pageNum);
        const textContent = await page.getTextContent();
        
        const pageItems = textContent.items.map(i => ({
            text: i.str.trim(),
            x: i.transform[4],
            y: i.transform[5]
        })).filter(i => i.text !== '');
        spatialItems = spatialItems.concat(pageItems);

        const pageText = textContent.items.map(i => i.str).join(" ");
        fullText += pageText + "\n";
      }

      document.getElementById('rawInputSPTJM').value = fullText.trim();
      labelFile.innerHTML = `<i class="fas fa-check text-success"></i> Ekstraksi Berhasil. Silakan cek preview.`;
      
      parseRawTextToForm(fullText, spatialItems);

    }).catch(err => {
       console.error("PDF Parser Error:", err);
       labelFile.innerHTML = `<span class="text-danger">Gagal membaca PDF.</span>`;
    });
  };
  reader.readAsArrayBuffer(file);
}

// --- PARSER LOGIC: EKSTRAK IDENTITAS DAN ANGKA MURNI DARI PDF ---
function parseRawTextToForm(text, spatialItems) {
  const fields = ['sptjm_nomor', 'sptjm_kode', 'sptjm_dpa', 'sptjm_npsn', 'sptjm_sekolah', 'sptjm_periode', 'sptjm_tahun', 'sptjm_kepsek_nama', 'sptjm_kepsek_nip'];
  fields.forEach(id => document.getElementById(id).value = "");
  
  const finFields = ['sptjm_saldo_awal', 'sptjm_tahap1', 'sptjm_tahap2', 'sptjm_belanja_op', 'sptjm_belanja_mod'];
  finFields.forEach(id => document.getElementById(id).value = "0");

  // Kosongkan Tunai & Bank untuk diset oleh sistem Kalkulasi
  document.getElementById('sptjm_sisa_tunai').value = "";
  document.getElementById('sptjm_sisa_bank').value = "";

  const npsnMatches = [...text.matchAll(/\b(\d{8})\b/g)];
  if (npsnMatches.length > 0) {
      document.getElementById('sptjm_npsn').value = npsnMatches[0][1];
  }

  const sekolahMatch = text.match(/disimpan pada Sekolah\s+(.*?)\s+untuk kelengkapan/i);
  if (sekolahMatch) {
      document.getElementById('sptjm_sekolah').value = sekolahMatch[1].trim();
  }

  const nomorMatch = text.match(/Nomor\s*:\s*([A-Za-z0-9\.\/\-]+)/i);
  if (nomorMatch && !nomorMatch[1].startsWith("1")) {
      document.getElementById('sptjm_nomor').value = nomorMatch[1].trim();
  }

  const periodeMatch = text.match(/pada\s+(.*?)\s+tahun\s+anggaran\s+(\d{4})/i);
  if (periodeMatch) {
    document.getElementById('sptjm_periode').value = periodeMatch[1].trim();
    document.getElementById('sptjm_tahun').value = periodeMatch[2].trim();
  }

  const ttdMatch = text.match(/Kepala\s+Sekolah,?\s+([A-Za-z\.\,\s]+?)\s+NIP[\.\s]*(\d{18})/i);
  if (ttdMatch) {
      document.getElementById('sptjm_kepsek_nama').value = ttdMatch[1].trim();
      document.getElementById('sptjm_kepsek_nip').value = ttdMatch[2].trim();
  }

  const getValByY = (labelRegex) => {
      const labelItem = spatialItems.find(i => labelRegex.test(i.text));
      if (!labelItem) return 0;
      
      const valueItems = spatialItems.filter(i => Math.abs(i.y - labelItem.y) < 5 && i.x > labelItem.x + 30);
      valueItems.sort((a, b) => a.x - b.x); 
      const combinedText = valueItems.map(i => i.text).join("");
      const cleanStr = combinedText.replace(/[^\d\.]/g, '');
      const finalStr = cleanStr.replace(/\.$/, ''); 
      if (finalStr) return parseInt(finalStr.replace(/\./g, ''), 10) || 0;
      return 0;
  };

  document.getElementById('sptjm_saldo_awal').value  = getValByY(/Saldo Awal/i);
  document.getElementById('sptjm_tahap1').value      = getValByY(/Tahap I\s*$/i);
  document.getElementById('sptjm_tahap2').value      = getValByY(/Tahap II\s*$/i);
  document.getElementById('sptjm_belanja_op').value  = getValByY(/Belanja Operasi/i);
  document.getElementById('sptjm_belanja_mod').value = getValByY(/Belanja Modal/i);
  
  // Tunai dan Bank di-skip dari PDF, murni ditentukan oleh hitungan form
  hitungTotalSPTJM();
}

function hitungTotalSPTJM() {
  const getVal = (id) => parseFloat(document.getElementById(id).value) || 0;
  
  const totalTerima = getVal('sptjm_saldo_awal') + getVal('sptjm_tahap1') + getVal('sptjm_tahap2');
  const totalKeluar = getVal('sptjm_belanja_op') + getVal('sptjm_belanja_mod');
  
  // Rumus Baku Akuntansi BOSP: Sisa = Penerimaan - Pengeluaran
  let sisa = totalTerima - totalKeluar;

  // [SENIOR FIX] Atasi Isu Presisi Floating Point (IEEE 754) Bawaan JavaScript
  // Bulatkan ke maksimal 2 desimal untuk membuang angka sampah.
  sisa = Math.round(sisa * 100) / 100;

  const fmt = (num) => num.toLocaleString('id-ID');

  document.getElementById('sptjm_total_terima').value = fmt(totalTerima);
  document.getElementById('sptjm_total_keluar').value = fmt(totalKeluar);
  document.getElementById('sptjm_sisa_dana').value = fmt(sisa);

  // [SENIOR FIX] Set Bank default ke Sisa Dana. 
  // Karena tidak ada "oninput" listener pada Bank/Tunai, input ini 100% bebas Anda edit/hapus manual
  document.getElementById('sptjm_sisa_bank').value = sisa;
}

function resetFormSPTJM() {
  document.getElementById('formIdentitasSPTJM').reset();
  document.getElementById('rawInputSPTJM').value = '';
  document.getElementById('fileImportSPTJM').value = '';
  document.getElementById('labelFileSPTJM').innerHTML = 'Identitas sekolah, Tanda Tangan, dan Keuangan akan ditarik murni dari PDF ini.';
  
  const fields = ['sptjm_nomor', 'sptjm_kode', 'sptjm_dpa', 'sptjm_npsn', 'sptjm_sekolah', 'sptjm_periode', 'sptjm_tahun', 'sptjm_kepsek_nama', 'sptjm_kepsek_nip'];
  fields.forEach(id => document.getElementById(id).value = "");
  
  document.getElementById('sptjm-result-section').style.display = 'none';
  HTML_SIAP_CETAK_SPTJM = "";
  hitungTotalSPTJM(); 
}

function generatePreviewSPTJM() {
  const rawText = document.getElementById('rawInputSPTJM').value.trim();
  if (!rawText) {
    if (typeof Swal !== 'undefined') {
      Swal.fire({
        icon: 'warning', 
        title: 'Data Kosong', 
        text: 'Anda belum mengimpor file PDF SPTJM ARKAS. Silakan upload file terlebih dahulu.'
      });
    } else {
      alert('Anda belum mengimpor file PDF SPTJM ARKAS. Silakan upload file terlebih dahulu.');
    }
    return;
  }

  const vNomor = document.getElementById('sptjm_nomor').value || "...................................................";
  const vNpsn = document.getElementById('sptjm_npsn').value || "";
  const vSekolah = document.getElementById('sptjm_sekolah').value || "";
  const vKode = document.getElementById('sptjm_kode').value || "";
  const vDpa = document.getElementById('sptjm_dpa').value || "";
  const vPeriode = document.getElementById('sptjm_periode').value || "";
  const vTahun = document.getElementById('sptjm_tahun').value || "";

  const kepsekNama = document.getElementById('sptjm_kepsek_nama').value || "";
  const kepsekNip = document.getElementById('sptjm_kepsek_nip').value || "";

  const getVal = (id) => parseFloat(document.getElementById(id).value) || 0;
  const fmt = (num) => num.toLocaleString('id-ID');

  const cSAwal = getVal('sptjm_saldo_awal');
  const cTahap1 = getVal('sptjm_tahap1');
  const cTahap2 = getVal('sptjm_tahap2');
  const cTerima = cSAwal + cTahap1 + cTahap2;

  const cBOp = getVal('sptjm_belanja_op');
  const cBMod = getVal('sptjm_belanja_mod');
  const cKeluar = cBOp + cBMod;

  const cSisa = cTerima - cKeluar;
  
  const cTunai = getVal('sptjm_sisa_tunai');
  const cBank = getVal('sptjm_sisa_bank');

  // Struktur Layout HTML Fix menggunakan Lajur Akuntansi
  const htmlTpl = `
    <style>
      @page { 
        size: A4 portrait; 
        margin-top: 15mm; 
        margin-right: 10mm; 
        margin-bottom: 5mm; 
        margin-left: 20mm; 
      }
      #print-sptjm-wrapper { font-family: 'Times New Roman', Times, serif; font-size: 11pt; line-height: 1.5; color: #000; padding: 10px 20px; }
      #print-sptjm-wrapper .title { text-align: center; font-weight: bold; text-decoration: underline; margin-bottom: 20px; font-size: 12pt;}
      #print-sptjm-wrapper p { text-align: justify; margin-bottom: 10px; }
      
      #print-sptjm-wrapper table { width: 100%; border-collapse: collapse; margin-bottom: 10px; line-height: 1.15; }
      #print-sptjm-wrapper td { vertical-align: top; padding: 1px 2px; }
      
      #print-sptjm-wrapper .td-label { width: 230px; }
      #print-sptjm-wrapper .td-colon { width: 15px; text-align: center; }
      #print-sptjm-wrapper .num-list { width: 25px; }
      
      @media print {
        body > *:not(#print-area) { display: none !important; }
        #print-area { display: block !important; position: absolute; top: 0; left: 0; width: 100%; }
      }
    </style>
    
    <div id="print-sptjm-wrapper">
      <div class="title">SURAT PERNYATAAN TANGGUNG JAWAB MUTLAK</div>
      
      <p>Saya yang bertanda tangan dibawah ini menyatakan bahwa bertanggung jawab secara formal dan material atas kebenaran realisasi penerimaan dan pengeluaran Dana BOSP Reguler serta kebenaran perhitungan dan setoran pajak yang telah dipungut atas penggunaan Dana BOSP Reguler pada <strong>${vPeriode}</strong> tahun anggaran <strong>${vTahun}</strong> dengan rincian sebagai berikut:</p>
      
      <!-- Nomor Di-Center -->
      <div style="text-align: center; margin-bottom: 15px; font-size: 11pt;">Nomor : ${vNomor}</div>

      <!-- Tabel 1: Identitas -->
      <table style="margin-left: 20px; width: calc(100% - 20px);">
        <tr><td class="num-list">1.</td><td class="td-label">NPSN</td><td class="td-colon">:</td><td>${vNpsn}</td></tr>
        <tr><td class="num-list">2.</td><td class="td-label">Nama Sekolah</td><td class="td-colon">:</td><td>${vSekolah}</td></tr>
        <tr><td class="num-list">3.</td><td class="td-label">Kode Sekolah</td><td class="td-colon">:</td><td>${vKode}</td></tr>
        <tr><td class="num-list">4.</td><td class="td-label">Nomor/Tanggal DPA SKPD</td><td class="td-colon">:</td><td>${vDpa}</td></tr>
        <tr><td class="num-list">5.</td><td colspan="3">Kegiatan Dana BOSP Reguler</td></tr>
      </table>

      <!-- Tabel 2: Keuangan (Dua Lajur) diberi margin-left: 45px -->
      <table style="margin-left: 45px; width: calc(100% - 45px);">
        <colgroup>
          <col style="width: 25px;"> <!-- Huruf A,B,C -->
          <col style="width: 25px;"> <!-- Angka 1,2,3 -->
          <col style="width: auto;"> <!-- Uraian -->
          <col style="width: 30px;"> <!-- Rp Dalam -->
          <col style="width: 90px;"> <!-- Nominal Dalam -->
          <col style="width: 30px;"> <!-- Rp Luar -->
          <col style="width: 110px;"> <!-- Nominal Luar -->
        </colgroup>

        <tr>
          <td>A.</td>
          <td colspan="4">Saldo Awal Dana BOSP Reguler</td>
          <td>Rp.</td>
          <td align="right">${fmt(cSAwal)}</td>
        </tr>
        <tr>
          <td>B.</td>
          <td colspan="6">Penerimaan Dana BOSP Reguler</td>
        </tr>
        <tr>
          <td></td>
          <td>1.</td>
          <td>Tahap I</td>
          <td>Rp.</td>
          <td align="right">${fmt(cTahap1)}</td>
          <td colspan="2"></td>
        </tr>
        <tr>
          <td></td>
          <td>2.</td>
          <td>Tahap II</td>
          <td>Rp.</td>
          <td align="right">${fmt(cTahap2)}</td>
          <td colspan="2"></td>
        </tr>
        <tr>
          <td></td>
          <td colspan="4"><strong>Jumlah Penerimaan</strong></td>
          <td><strong>Rp.</strong></td>
          <td align="right"><strong>${fmt(cTerima)}</strong></td>
        </tr>

        <tr><td colspan="7" style="height: 10px;"></td></tr>

        <tr>
          <td>C.</td>
          <td colspan="6">Pengeluaran Dana BOSP Reguler</td>
        </tr>
        <tr>
          <td></td>
          <td>1.</td>
          <td>Jenis Belanja Operasi</td>
          <td>Rp.</td>
          <td align="right">${fmt(cBOp)}</td>
          <td colspan="2"></td>
        </tr>
        <tr>
          <td></td>
          <td>2.</td>
          <td>Jenis Belanja Modal</td>
          <td>Rp.</td>
          <td align="right">${fmt(cBMod)}</td>
          <td colspan="2"></td>
        </tr>
        <tr>
          <td></td>
          <td colspan="4"><strong>Jumlah Pengeluaran</strong></td>
          <td><strong>Rp.</strong></td>
          <td align="right"><strong>${fmt(cKeluar)}</strong></td>
        </tr>

        <tr><td colspan="7" style="height: 10px;"></td></tr>

        <tr>
          <td>D.</td>
          <td colspan="4">Sisa Dana BOSP Reguler</td>
          <td>Rp.</td>
          <td align="right">${fmt(cSisa)}</td>
        </tr>
        <tr>
          <td></td>
          <td colspan="6">Terdiri atas :</td>
        </tr>
        <tr>
          <td></td>
          <td>1.</td>
          <td>Sisa Kas Tunai</td>
          <td>Rp.</td>
          <td align="right">${fmt(cTunai)}</td>
          <td colspan="2"></td>
        </tr>
        <tr>
          <td></td>
          <td>2.</td>
          <td>Sisa di Bank</td>
          <td>Rp.</td>
          <td align="right">${fmt(cBank)}</td>
          <td colspan="2"></td>
        </tr>
      </table>

      <p style="margin-top:20px;">Bukti-bukti atas belanja tersebut pada huruf B disimpan pada Sekolah <strong>${vSekolah}</strong> untuk kelengkapan Administrasi dan keperluan pemeriksaan sesuai peraturan perundang-undangan. Apabila bukti-bukti tersebut tidak benar yang mengakibatkan kerugian daerah, saya bertanggungjawab sepenuhnya atas kerugian daerah dimaksud sesuai kewenangan saya berdasarkan ketentuan peraturan perundang-undangan.</p>
      
      <p>Demikian surat pernyataan ini dibuat dengan sebenarnya.</p>

      <table style="margin-top: 30px; text-align: center;">
        <tr>
          <td width="50%"></td>
          <td width="50%">
            <br>
            Kepala Sekolah,<br><br><br><br><br>
            <strong>${kepsekNama}</strong><br>
            NIP ${kepsekNip}
          </td>
        </tr>
      </table>
    </div>
  `;

  HTML_SIAP_CETAK_SPTJM = htmlTpl;
  document.getElementById('preview-content-sptjm').innerHTML = htmlTpl;
  document.getElementById('sptjm-result-section').style.display = 'block';
  
  document.getElementById('sptjm-result-section').scrollIntoView({ behavior: 'smooth' });
}

function eksekusiCetakSPTJM() {
  if (!HTML_SIAP_CETAK_SPTJM) return;
  const area = document.getElementById('print-area');
  area.innerHTML = HTML_SIAP_CETAK_SPTJM;
  
  setTimeout(() => {
    window.print();
  }, 100);
}
</script>
</div>
